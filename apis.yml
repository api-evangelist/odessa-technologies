name: Odessa Technologies
description: |
  Odessa is a Philadelphia-headquartered lease and loan management software
  company founded in 1998 that powers asset finance for banks, captive finance
  companies, and independent lenders. The Odessa Platform manages roughly
  $200B in assets across equipment finance and auto finance, covering the full
  asset lifecycle from origination through servicing and remarketing on a
  modern, API-first, Microsoft Azure-hosted SaaS stack with low-code
  developer tools, packaged integrations, and an Odessa AI layer for agentic
  asset-finance workflows. The platform's APIs and developer tooling are
  delivered to licensed customers (no public developer portal, no OpenAPI,
  no public SDK or GitHub org); profiling here captures the surface visible
  from the marketing site, integrations catalog, and engineering blog.
url: https://github.com/api-evangelist/odessa-technologies
